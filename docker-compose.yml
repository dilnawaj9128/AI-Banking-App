version: '3.8'

services:

  mongo:
    image: mongo:7
    container_name: bankapp-mongo
    volumes:
      - mongo-data:/data/db
    networks:
      - bankapp-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: bankapp-backend
    environment:
      - PORT=5000
      - JWT_SECRET=super-secret-jwt-key
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/bankapp
    depends_on:
      - mongo
    networks:
      - bankapp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=/api
    container_name: bankapp-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - bankapp-network
    restart: unless-stopped

volumes:
  mongo-data:

networks:
  bankapp-network:
    driver: bridge
