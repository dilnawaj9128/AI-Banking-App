version: '3.8'

services:

  backend:
    build:
      context: ./backend
    container_name: bankapp-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - JWT_SECRET=super-secret-jwt-key
      - NODE_ENV=production
    networks:
      - bankapp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://13.60.157.181:5000/api
    container_name: bankapp-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - bankapp-network
    restart: unless-stopped

networks:
  bankapp-network:
    driver: bridge
