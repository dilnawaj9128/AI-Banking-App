apiVersion: v1
kind: Namespace
metadata:
  name: bankapp
---
apiVersion: v1
kind: Secret
metadata:
  name: bankapp-secrets
  namespace: bankapp
type: Opaque
stringData:
  jwt-secret: "change-this-in-production"
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bankapp-ingress
  namespace: bankapp
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: bankapp.yourdomain.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: bankapp-backend-svc
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: bankapp-frontend-svc
            port:
              number: 80
